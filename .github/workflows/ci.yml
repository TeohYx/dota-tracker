name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test -- --run
      - run: npm run build
        env:
          APP_PASSWORD: ci-placeholder
          APP_SECRET: ci-placeholder-secret-please-ignore
          DEFAULT_ACCOUNT_ID: "403281874"
